services:
  - type: web
    name: invest-academy
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --worker-class gthread --workers 1 --threads 4 --timeout 60
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
